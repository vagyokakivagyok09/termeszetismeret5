<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Természetismeret Játék 🌿</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --grass:#4a7c2f;--grass-light:#6aad42;
    --earth:#c4914a;--earth-dark:#7a4e1e;
    --sun:#f7cc3a;--sun-warm:#e89c10;
    --water:#2a7faa;--water-light:#4ab0d4;
    --true-col:#2e7d32;--true-bg:#e8f5e9;
    --false-col:#c62828;--false-bg:#ffebee;
    --card-bg:#fffef4;--text-dark:#1e2d0e;--text-mid:#3d5220;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',sans-serif;min-height:100vh;background:linear-gradient(160deg,#b8dff0 0%,#cfe89a 50%,#c4914a 100%);color:var(--text-dark);overflow-x:hidden;}
  .bg-deco{position:fixed;bottom:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden;}
  .blade{position:absolute;bottom:0;width:18px;border-radius:50% 50% 0 0;transform-origin:bottom center;animation:sway 3s ease-in-out infinite alternate;}
  @keyframes sway{from{transform:rotate(-8deg)}to{transform:rotate(8deg)}}
  .sun-fixed{position:fixed;top:16px;right:22px;font-size:2.8rem;z-index:2;animation:spin 20s linear infinite;filter:drop-shadow(0 0 10px #f7cc3a);}
  @keyframes spin{to{transform:rotate(360deg)}}
  #app{position:relative;z-index:2;max-width:740px;margin:0 auto;padding:16px 14px 70px;}
  header{text-align:center;padding:24px 10px 10px;}
  header h1{font-family:'Baloo 2',cursive;font-size:2.2rem;font-weight:800;color:var(--text-dark);text-shadow:3px 3px 0 var(--sun),5px 5px 0 var(--earth-dark);line-height:1.15;}
  header p{margin-top:6px;font-size:0.97rem;color:var(--text-mid);font-weight:600;}
  @keyframes cardIn{from{opacity:0;transform:translateY(18px) scale(0.97)}to{opacity:1;transform:none}}
  .card{background:var(--card-bg);border-radius:22px;padding:26px 24px 22px;border:2.5px solid #d4c070;box-shadow:5px 6px 0 #b09030;animation:cardIn 0.35s cubic-bezier(.4,0,.2,1);}

  /* NAME */
  .name-screen{text-align:center;}
  .name-screen h2{font-family:'Baloo 2',cursive;font-size:1.7rem;font-weight:800;color:var(--grass);margin-bottom:8px;}
  .name-screen p{color:var(--text-mid);font-size:1rem;margin-bottom:24px;font-weight:600;}
  .name-input{font-family:'Baloo 2',cursive;font-size:1.15rem;font-weight:700;padding:13px 18px;border-radius:16px;border:2.5px solid var(--grass);width:100%;max-width:320px;text-align:center;outline:none;color:var(--text-dark);background:#f6ffe0;box-shadow:2px 3px 0 var(--grass);margin-bottom:20px;display:block;margin-left:auto;margin-right:auto;}
  .name-input:focus{border-color:var(--sun-warm);}

  /* BIG TOPIC CHOOSER */
  .bigtopic-screen{text-align:center;}
  .bigtopic-screen h2{font-family:'Baloo 2',cursive;font-size:1.55rem;font-weight:800;color:var(--grass);margin-bottom:4px;}
  .bigtopic-screen .sub{font-size:0.95rem;color:var(--text-mid);font-weight:600;margin-bottom:22px;}
  .bigtopic-grid{display:grid;grid-template-columns:1fr;gap:14px;margin-bottom:18px;}
  .bigtopic-btn{
    width:100%;font-family:'Baloo 2',cursive;font-weight:800;
    padding:20px 22px;border-radius:20px;border:3px solid;
    cursor:pointer;transition:all 0.18s;text-align:left;
    display:flex;align-items:center;gap:16px;
    box-shadow:4px 5px 0 var(--earth-dark);
  }
  .bigtopic-btn.fuves{border-color:var(--grass);background:linear-gradient(135deg,#e8ffe0,#d0f0b0);color:var(--grass);}
  .bigtopic-btn.fuves:hover{transform:translateY(-3px) scale(1.02);background:linear-gradient(135deg,#d0f5c0,#b8e890);}
  .bigtopic-btn.vizek{border-color:var(--water);background:linear-gradient(135deg,#e0f4ff,#b8e0f8);color:var(--water);}
  .bigtopic-btn.vizek:hover{transform:translateY(-3px) scale(1.02);background:linear-gradient(135deg,#c8ecff,#a0d4f0);}
  .bigtopic-icon{font-size:2.8rem;flex-shrink:0;}
  .bigtopic-title{font-size:1.1rem;font-weight:800;color:var(--text-dark);}
  .bigtopic-sub{font-size:0.8rem;font-weight:600;color:var(--text-mid);margin-top:3px;}

  /* SUBTOPIC LIST */
  .subtopic-screen h2{font-family:'Baloo 2',cursive;font-size:1.3rem;font-weight:800;color:var(--grass);margin-bottom:4px;text-align:center;}
  .subtopic-screen.water-theme h2{color:var(--water);}
  .subtopic-screen .sub{font-size:0.9rem;color:var(--text-mid);font-weight:600;margin-bottom:18px;text-align:center;}
  .subtopic-grid{display:grid;grid-template-columns:1fr;gap:9px;margin-bottom:16px;}
  .subtopic-btn{font-family:'Baloo 2',cursive;font-weight:700;font-size:0.97rem;padding:13px 16px;border-radius:15px;border:2.5px solid #b0cc70;background:#f4ffe0;color:var(--text-dark);cursor:pointer;transition:all 0.15s;text-align:left;display:flex;align-items:center;gap:11px;box-shadow:2px 3px 0 #8aaa30;}
  .subtopic-btn:hover{background:#e0f8b0;border-color:var(--grass);transform:translateX(4px);}
  .subtopic-btn.water-style{border-color:#7ac8e8;background:#e8f6ff;box-shadow:2px 3px 0 #4a90b8;}
  .subtopic-btn.water-style:hover{background:#c8ecff;border-color:var(--water);transform:translateX(4px);}
  .subtopic-btn .snum{font-family:'Baloo 2',cursive;font-size:1.15rem;font-weight:800;color:var(--grass);min-width:26px;}
  .subtopic-btn.water-style .snum{color:var(--water);}
  .subtopic-btn .sicon{font-size:1.4rem;flex-shrink:0;}
  .subtopic-btn .stitle{font-size:0.95rem;font-weight:700;}
  .subtopic-btn .sstatus{font-size:0.72rem;color:var(--text-mid);margin-top:1px;}
  .subtopic-btn.locked{opacity:0.5;cursor:not-allowed;}
  .subtopic-btn.locked:hover{transform:none;background:#f4ffe0;}
  .subtopic-btn.water-style.locked:hover{transform:none;background:#e8f6ff;}
  .coming-badge{background:#ffe0c0;color:#8b3010;border-radius:10px;padding:2px 8px;font-size:0.7rem;font-weight:800;margin-left:auto;white-space:nowrap;flex-shrink:0;}
  .ready-badge{background:#d0f0b0;color:#2a6010;border-radius:10px;padding:2px 8px;font-size:0.7rem;font-weight:800;margin-left:auto;white-space:nowrap;flex-shrink:0;}
  .ready-badge.water{background:#c8ecff;color:#1a5a7a;}

  /* MODE */
  .mode-screen h2{font-family:'Baloo 2',cursive;font-size:1.25rem;font-weight:800;color:var(--grass);margin-bottom:4px;text-align:center;}
  .mode-screen.water-theme h2{color:var(--water);}
  .mode-screen .sub{font-size:0.9rem;color:var(--text-mid);font-weight:600;margin-bottom:18px;text-align:center;}
  .mode-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px;}
  .mode-btn{font-family:'Baloo 2',cursive;font-weight:800;font-size:0.95rem;padding:17px 10px;border-radius:17px;border:3px solid;cursor:pointer;transition:all 0.18s;text-align:center;}
  .mode-btn .btn-icon{font-size:1.9rem;display:block;margin-bottom:5px;}
  .mode-btn .btn-label{display:block;font-size:0.92rem;}
  .mode-btn .btn-sub{display:block;font-size:0.7rem;font-weight:600;opacity:0.75;margin-top:3px;}
  .mode-btn.igaz{background:var(--true-bg);color:var(--true-col);border-color:var(--true-col);box-shadow:3px 4px 0 #1a4f1e;}
  .mode-btn.igaz:hover{transform:translateY(-3px);background:#b9f0bc;}
  .mode-btn.kviz{background:#e8f0ff;color:#1a3a8f;border-color:#3355cc;box-shadow:3px 4px 0 #1a2a8f;}
  .mode-btn.kviz:hover{transform:translateY(-3px);background:#c8d8ff;}
  .mode-btn.lyukas{background:#fff0e8;color:#7a3010;border-color:#e05c1a;box-shadow:3px 4px 0 #8b3010;}
  .mode-btn.lyukas:hover{transform:translateY(-3px);background:#ffe0c8;}

  /* TOP BAR */
  .top-bar{display:flex;align-items:center;gap:7px;margin-bottom:18px;flex-wrap:wrap;}
  .q-counter{font-family:'Baloo 2',cursive;font-weight:800;font-size:0.97rem;color:var(--grass);white-space:nowrap;min-width:68px;}
  .prog-wrap{flex:1;background:rgba(255,255,255,0.45);border-radius:20px;height:13px;overflow:hidden;border:2px solid rgba(74,124,47,0.3);min-width:50px;}
  .prog-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--grass-light),var(--sun));transition:width 0.5s cubic-bezier(.4,0,.2,1);}
  .score-pill{font-family:'Baloo 2',cursive;font-weight:800;font-size:0.97rem;background:var(--card-bg);border:2px solid var(--grass);border-radius:30px;padding:3px 11px;color:var(--grass);box-shadow:2px 2px 0 var(--grass);white-space:nowrap;}
  .timer-pill{font-family:'Baloo 2',cursive;font-weight:800;font-size:0.97rem;background:#e8f0ff;border:2px solid #5577cc;border-radius:30px;padding:3px 11px;color:#2244aa;box-shadow:2px 2px 0 #2244aa;white-space:nowrap;}
  .streak-pill{font-family:'Baloo 2',cursive;font-weight:800;font-size:0.97rem;background:#fff8e0;border:2px solid var(--sun-warm);border-radius:30px;padding:3px 11px;color:var(--earth-dark);box-shadow:2px 2px 0 var(--sun-warm);white-space:nowrap;transition:background 0.3s,border-color 0.3s,color 0.3s;}
  .streak-pill.pop{animation:streakPop 0.4s cubic-bezier(.4,0,.2,1);}
  @keyframes streakPop{0%{transform:scale(1)}40%{transform:scale(1.45) rotate(-6deg)}70%{transform:scale(0.92) rotate(4deg)}100%{transform:scale(1) rotate(0)}}
  .streak-pill.on-fire{background:linear-gradient(90deg,#ffe066,#ff8c00);border-color:#cc5500;color:white;box-shadow:2px 2px 0 #8b3800;}
  .streak-pill.broken{background:#ffe0e0;border-color:var(--false-col);color:var(--false-col);box-shadow:2px 2px 0 #7a1010;animation:streakBreak 0.45s ease;}
  @keyframes streakBreak{0%{transform:scale(1)}30%{transform:scale(1.12) rotate(8deg)}65%{transform:scale(0.9) rotate(-5deg)}100%{transform:scale(1) rotate(0)}}

  /* DIFF */
  .diff-badge{display:inline-block;border-radius:20px;padding:3px 13px;font-family:'Baloo 2',cursive;font-size:0.8rem;font-weight:800;margin-bottom:13px;}
  .diff-1{background:#d4f7c0;color:#2a6010;border:2px solid #6aad42;}
  .diff-2{background:#fff3c0;color:#7a5000;border:2px solid #e89c10;}
  .diff-3{background:#ffd9c0;color:#7a2800;border:2px solid #e05c1a;}

  /* Q */
  .q-number{font-family:'Baloo 2',cursive;font-size:0.85rem;font-weight:700;color:#a08030;margin-bottom:5px;}
  .q-text{font-family:'Baloo 2',cursive;font-size:1.15rem;font-weight:700;color:var(--text-dark);line-height:1.45;margin-bottom:18px;}

  /* TF */
  .tf-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:13px;}
  .ans-btn{font-family:'Baloo 2',cursive;font-size:1.2rem;font-weight:800;padding:15px 10px;border-radius:16px;border:3px solid;cursor:pointer;transition:transform 0.13s,background 0.13s;display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn-true{background:var(--true-bg);color:var(--true-col);border-color:var(--true-col);box-shadow:3px 4px 0 #1a4f1e;}
  .btn-false{background:var(--false-bg);color:var(--false-col);border-color:var(--false-col);box-shadow:3px 4px 0 #7a1010;}
  .ans-btn:hover:not(:disabled){transform:translateY(-3px) scale(1.04);}
  .ans-btn:disabled{cursor:default;opacity:0.7;}
  .ans-btn.selected-correct{background:#b9f0bc;transform:scale(1.04);}
  .ans-btn.selected-wrong{background:#ffb3b3;}
  .ans-btn.reveal-correct{background:#b9f0bc;}

  /* QUIZ OPTS */
  .opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:13px;}
  .opt-btn{font-family:'Nunito',sans-serif;font-size:0.93rem;font-weight:700;padding:11px 12px;border-radius:13px;border:2.5px solid #aac060;background:#f4ffe0;color:var(--text-dark);cursor:pointer;transition:all 0.15s;text-align:left;line-height:1.35;}
  .opt-btn:hover:not(:disabled){background:#fff176;border-color:var(--sun-warm);transform:scale(1.03);}
  .opt-btn:disabled{cursor:default;}
  .opt-btn.selected-correct{background:#b9f0bc;border-color:var(--true-col);color:#1a4f1e;}
  .opt-btn.selected-wrong{background:#ffb3b3;border-color:var(--false-col);color:#7a0000;}
  .opt-btn.reveal-correct{background:#b9f0bc;border-color:var(--true-col);}

  /* FILL */
  .fill-sentence{font-family:'Nunito',sans-serif;font-size:1.04rem;font-weight:600;line-height:2.4;color:var(--text-dark);margin-bottom:15px;background:#f8ffe8;border-radius:13px;padding:15px 17px;border:2px solid #c8dc80;}
  .fill-select{font-family:'Baloo 2',cursive;font-size:0.95rem;font-weight:700;padding:4px 9px;border-radius:9px;border:2.5px solid var(--earth);background:#fff8e0;color:var(--earth-dark);cursor:pointer;outline:none;vertical-align:middle;box-shadow:2px 2px 0 var(--sun-warm);min-width:110px;}
  .fill-select:focus{border-color:var(--grass);}
  .fill-select.correct{background:#b9f0bc;border-color:var(--true-col);color:#1a4f1e;}
  .fill-select.wrong{background:#ffb3b3;border-color:var(--false-col);color:#7a0000;}
  .fill-select:disabled{cursor:default;}
  .fill-hint{font-size:0.86rem;color:var(--text-mid);font-weight:600;margin-bottom:13px;font-style:italic;}
  .check-fill-btn{font-family:'Baloo 2',cursive;font-size:1.02rem;font-weight:800;padding:11px 32px;background:var(--earth);color:white;border:none;border-radius:28px;cursor:pointer;box-shadow:3px 4px 0 var(--earth-dark);transition:all 0.15s;display:block;margin:0 auto 13px;}
  .check-fill-btn:hover{transform:translateY(-2px);background:var(--sun-warm);}
  .check-fill-btn:disabled{opacity:0.5;cursor:default;transform:none;}
  .fill-result{border-radius:13px;padding:12px 15px;font-size:0.95rem;font-weight:700;line-height:1.5;margin-bottom:13px;display:none;}
  .fill-result.show{display:block;animation:feedIn 0.25s ease;}
  .fill-result.correct{background:#d4f7d4;border:2.5px solid var(--true-col);color:#1a4f1e;}
  .fill-result.wrong{background:#ffe0e0;border:2.5px solid var(--false-col);color:#7a0000;}
  .fill-result.partial{background:#fff3c0;border:2.5px solid var(--sun-warm);color:#7a5000;}

  /* FEEDBACK */
  .feedback{border-radius:13px;padding:12px 15px;font-size:0.95rem;font-weight:700;line-height:1.5;margin-bottom:13px;display:none;}
  .feedback.show{display:block;animation:feedIn 0.25s ease;}
  @keyframes feedIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .feedback.correct{background:#d4f7d4;border:2.5px solid var(--true-col);color:#1a4f1e;}
  .feedback.wrong{background:#ffe0e0;border:2.5px solid var(--false-col);color:#7a0000;}

  .next-btn{font-family:'Baloo 2',cursive;font-size:1.02rem;font-weight:800;padding:12px 36px;background:var(--grass);color:white;border:none;border-radius:28px;cursor:pointer;box-shadow:3px 4px 0 var(--earth-dark);transition:all 0.15s;display:none;margin:0 auto;}
  .next-btn.show{display:block;}
  .next-btn:hover{background:var(--grass-light);transform:translateY(-2px);}

  /* RESULT */
  .result-screen{text-align:center;}
  .result-emoji{font-size:3.8rem;display:block;margin-bottom:10px;}
  .result-title{font-family:'Baloo 2',cursive;font-size:1.85rem;font-weight:800;color:var(--grass);margin-bottom:6px;}
  .result-sub{font-size:0.97rem;color:var(--text-mid);margin-bottom:18px;font-weight:600;}
  .result-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:13px;}
  .stat-box{background:#f4ffe4;border:2px solid var(--grass-light);border-radius:13px;padding:11px 6px;}
  .stat-box.streak-stat{background:#fff8e0;border-color:var(--sun-warm);}
  .stat-box.time-stat{background:#e8f0ff;border-color:#5577cc;}
  .stat-num{font-family:'Baloo 2',cursive;font-size:1.6rem;font-weight:800;color:var(--grass);}
  .stat-box.streak-stat .stat-num{color:var(--earth-dark);}
  .stat-box.time-stat .stat-num{color:#2244aa;}
  .stat-lbl{font-size:0.72rem;color:var(--text-mid);font-weight:700;}
  .stars{font-size:1.8rem;letter-spacing:4px;margin-bottom:10px;}
  .saving-msg{font-family:'Baloo 2',cursive;font-size:0.95rem;font-weight:700;color:var(--text-mid);margin-bottom:13px;min-height:24px;}
  .saving-msg.ok{color:var(--true-col);}.saving-msg.err{color:var(--false-col);}
  .result-btns{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;}
  .rbtn{font-family:'Baloo 2',cursive;font-size:0.95rem;font-weight:800;padding:11px 20px;border:none;border-radius:28px;cursor:pointer;box-shadow:3px 3px 0 var(--earth-dark);transition:all 0.15s;color:white;}
  .rbtn:hover{transform:translateY(-2px);filter:brightness(1.1);}
  .rbtn.orange{background:var(--earth);}
  .rbtn.green{background:var(--grass);}
  .rbtn.blue{background:#3366cc;}

  /* BACK */
  .back-btn{font-family:'Baloo 2',cursive;font-size:0.9rem;font-weight:700;background:none;border:2px solid var(--earth);color:var(--earth-dark);border-radius:18px;padding:6px 16px;cursor:pointer;transition:all 0.15s;margin-right:6px;}
  .back-btn:hover{background:var(--earth);color:white;}
  .start-btn{font-family:'Baloo 2',cursive;font-size:1.15rem;font-weight:800;padding:13px 40px;background:var(--grass);color:white;border:none;border-radius:28px;cursor:pointer;box-shadow:3px 4px 0 var(--earth-dark);transition:all 0.15s;}
  .start-btn:hover{background:var(--grass-light);transform:translateY(-2px);}
  .start-btn:disabled{opacity:0.5;cursor:default;transform:none;}

  @media(max-width:520px){
    header h1{font-size:1.7rem;}
    .mode-grid{grid-template-columns:1fr;}
    .opts-grid{grid-template-columns:1fr;}
    .tf-row .ans-btn{font-size:1.05rem;padding:13px 8px;}
  }

  /* ── SORRENDBE ÁLLÍTÁS ── */
  .sort-intro{font-size:0.92rem;color:var(--text-mid);font-weight:600;margin-bottom:14px;font-style:italic;background:#f4ffe0;border-radius:11px;padding:10px 14px;border:2px solid #b8d860;}
  .sort-list{display:flex;flex-direction:column;gap:9px;margin-bottom:16px;min-height:40px;}
  .sort-item{
    background:#fffef4;border:2.5px solid #b0cc60;border-radius:14px;
    padding:13px 16px;font-family:'Baloo 2',cursive;font-size:1rem;font-weight:700;
    color:var(--text-dark);cursor:grab;user-select:none;
    display:flex;align-items:center;gap:10px;
    box-shadow:2px 3px 0 #8aaa30;transition:transform 0.15s,box-shadow 0.15s,background 0.15s;
  }
  .sort-item:active{cursor:grabbing;}
  .sort-item.dragging{opacity:0.45;transform:scale(1.04);box-shadow:4px 6px 0 #4a7c2f;}
  .sort-item.drag-over{background:#d0f0b0;border-color:var(--grass);}
  .sort-item.correct-item{background:#b9f0bc;border-color:var(--true-col);}
  .sort-item.wrong-item{background:#ffb3b3;border-color:var(--false-col);}
  .sort-handle{font-size:1.2rem;opacity:0.5;flex-shrink:0;}
  .sort-num{font-family:'Baloo 2',cursive;font-weight:800;font-size:1.1rem;color:var(--grass);min-width:22px;flex-shrink:0;}
  .sort-check-btn{font-family:'Baloo 2',cursive;font-size:1.05rem;font-weight:800;padding:12px 34px;background:var(--grass);color:white;border:none;border-radius:28px;cursor:pointer;box-shadow:3px 4px 0 var(--earth-dark);transition:all 0.15s;display:block;margin:0 auto 13px;}
  .sort-check-btn:hover{transform:translateY(-2px);background:var(--grass-light);}
  .sort-check-btn:disabled{opacity:0.5;cursor:default;transform:none;}
  .sort-result{border-radius:13px;padding:12px 15px;font-size:0.95rem;font-weight:700;line-height:1.5;margin-bottom:13px;display:none;}
  .sort-result.show{display:block;animation:feedIn 0.25s ease;}
  .sort-result.correct{background:#d4f7d4;border:2.5px solid var(--true-col);color:#1a4f1e;}
  .sort-result.wrong{background:#ffe0e0;border:2.5px solid var(--false-col);color:#7a0000;}

  /* ── KATEGORIZÁLÁS ── */
  .cat-intro{font-size:0.92rem;color:var(--text-mid);font-weight:600;margin-bottom:14px;font-style:italic;background:#e8f4ff;border-radius:11px;padding:10px 14px;border:2px solid #90c0e0;}
  .cat-items-pool{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;min-height:44px;padding:10px;background:rgba(255,255,255,0.5);border-radius:14px;border:2px dashed #b0cc60;}
  .cat-item{
    background:#fffef4;border:2.5px solid #b0cc60;border-radius:11px;
    padding:8px 14px;font-family:'Baloo 2',cursive;font-size:0.95rem;font-weight:700;

let playerName='', currentBigTopic=null, currentTopic=null, mode='';
let current=0, score=0, streak=0, bestStreak=0, answered=false;
let startTime=0, timerInterval=null, elapsedSeconds=0;

function formatTime(s){const m=Math.floor(s/60),sec=s%60;return(m>0?m+' perc ':'')+sec+' mp';}
function streakLabel(){if(streak===0)return'🔥 0';if(streak>=5)return'🔥🔥 '+streak+'!!!';if(streak>=3)return'🔥 '+streak+'!';return'🔥 '+streak;}
function diffLabel(d){if(d===1)return['diff-1','🟢 Könnyű'];if(d===2)return['diff-2','🟡 Közepes'];return['diff-3','🔴 Nehéz'];}
function starsStr(sc,total){const p=sc/total;if(p>=0.9)return'⭐⭐⭐';if(p>=0.65)return'⭐⭐';return'⭐';}
function updateTimer(){elapsedSeconds=Math.floor((Date.now()-startTime)/1000);const el=document.getElementById('timerPill');if(el)el.textContent='⏱ '+formatTime(elapsedSeconds);}

// ═══════════════════════════════
// KÉPERNYŐK
// ═══════════════════════════════
function showNameScreen(pendingTopicId){
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  document.getElementById('gameArea').innerHTML=
    '<div class="card name-screen">'+
      '<div style="font-size:3rem;margin-bottom:10px;">🌿</div>'+
      '<h2>Üdvözöllek!</h2>'+
      '<p>Írd be a neved a játék előtt!</p>'+
      '<input class="name-input" id="nameInput" type="text" placeholder="Pl. Kovács Péter" maxlength="40"/>'+
      '<button class="start-btn" id="startBtn" onclick="goToModes('+pendingTopicId+')" disabled>Tovább →</button>'+
    '</div>';
  const inp=document.getElementById('nameInput');
  inp.addEventListener('input',function(){document.getElementById('startBtn').disabled=this.value.trim().length<2;});
  inp.addEventListener('keydown',function(e){if(e.key==='Enter'&&this.value.trim().length>=2)goToModes(pendingTopicId);});
  inp.focus();
}

function goToModes(topicId){
  const inp=document.getElementById('nameInput');
  if(inp)playerName=inp.value.trim();
  if(playerName.length<2)return;
  showModes(topicId);
}

    btns+=

          '<span class="bigtopic-title">'+bt.title+'</span>'+
          '<span class="bigtopic-sub">'+bt.subtopics.length+' altéma · '+readyCount+' elérhető</span>'+
        '</span>'+
      '</button>';
  });

    '<div class="card bigtopic-screen">'+
      '<h2>🌿 Természetismeret</h2>'+
      '<p class="sub">Válaszd ki a nagy témakört!</p>'+
      '<div class="bigtopic-grid">'+btns+'</div>'+
    '</div>';
}

  currentBigTopic.subtopics.forEach(function(t){
    const locked=t.ready?'':'locked';
    const click=t.ready?'onclick="showNameScreen('+t.id+')"':'';
    const wStyle=isWater?'water-style':'';

      ?'<span class="ready-badge'+(isWater?' water':'')+'">✅ Elérhető</span>'

        '<span class="sicon">'+t.icon+'</span>'+
        '<span>'+
          '<span class="stitle">'+t.title+'</span>'+
          '<span class="sstatus">'+(t.ready?'20 Ig/H · 10 Kvíz · 10 Lyukas':'Hamarosan feltölti a tanár')+'</span>'+
        '</span>'+
        badge+
      '</button>';
  });

    '<div class="card subtopic-screen'+(isWater?' water-theme':'')+'">'+
      '<h2>'+currentBigTopic.icon+' '+currentBigTopic.title+'</h2>'+
      '<p class="sub">Válaszd ki az altémát!</p>'+
      '<div class="subtopic-grid">'+rows+'</div>'+
      '<button class="back-btn" onclick="showBigTopics()">← Vissza</button>'+
    '</div>';

function showModes(topicId){
  currentTopic=currentBigTopic.subtopics.find(function(t){return t.id===topicId;});
  const isWater=currentBigTopic.id==='vizek';
  document.getElementById('gameArea').innerHTML=
    '<div class="card mode-screen'+(isWater?' water-theme':'')+'">'+
      '<h2>'+currentTopic.icon+' '+currentTopic.title+'</h2>'+
      '<p class="sub">Melyik játékmódot választod, '+playerName+'?</p>'+
      '<div class="mode-grid" style="grid-template-columns:1fr 1fr;">'+
        '<button class="mode-btn igaz" onclick="startGame(\'tf\')">'+
          '<span class="btn-icon">✅</span><span class="btn-label">Igaz vagy Hamis?</span><span class="btn-sub">20 állítás</span>'+
        '</button>'+
        '<button class="mode-btn kviz" onclick="startGame(\'quiz\')">'+
          '<span class="btn-icon">🧠</span><span class="btn-label">Kvíz</span><span class="btn-sub">10 kérdés</span>'+
        '</button>'+
        '<button class="mode-btn lyukas" onclick="startGame(\'fill\')">'+
          '<span class="btn-icon">✏️</span><span class="btn-label">Lyukas szöveg</span><span class="btn-sub">10 mondat</span>'+
        '</button>'+
        (currentTopic.sort&&currentTopic.sort.length?'<button class="mode-btn sort" onclick="startGame(\'sort\')"><span class="btn-icon">🔢</span><span class="btn-label">Sorrendbe állítás</span><span class="btn-sub">'+currentTopic.sort.length+' feladat</span></button>':'')+
        (currentTopic.cat&&currentTopic.cat.length?'<button class="mode-btn cat" onclick="startGame(\'cat\')"><span class="btn-icon">🗂️</span><span class="btn-label">Kategorizálás</span><span class="btn-sub">'+currentTopic.cat.length+' feladat</span></button>':'')+
      '</div>'+
      '<button class="back-btn" onclick="showSubtopics(\''+currentBigTopic.id+'\')">← Vissza</button>'+

function startGame(m){
  mode=m;current=0;score=0;streak=0;bestStreak=0;answered=false;
  startTime=Date.now();elapsedSeconds=0;
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=setInterval(updateTimer,1000);
  render();
}

// ═══════════════════════════════
// RENDER
// ═══════════════════════════════
function render(){
  const area=document.getElementById('gameArea');
  const questions=mode==='tf'?currentTopic.tf:mode==='quiz'?currentTopic.quiz:mode==='fill'?currentTopic.fill:mode==='sort'?currentTopic.sort:currentTopic.cat;
  const total=questions.length;
  if(current>=total){
    if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
    const pct=Math.round(score/total*100);
    let emoji,title,sub;
    if(pct>=90){emoji='🏆';title='Mester szint!';sub='Szinte tökéletes — gratulálunk, '+playerName+'!';}
    else if(pct>=70){emoji='🌟';title='Nagyszerű munka!';sub='Nagyon jól ismered az anyagot!';}
    else if(pct>=50){emoji='🌱';title='Jó kezdet!';sub='Nézd át újra és biztosan jobban megy!';}
    else{emoji='🌾';title='Még gyakorolni kell!';sub='Olvasd el a tananyagot és próbáld újra!';}
    const modeLabel=mode==='tf'?'Igaz/Hamis':mode==='quiz'?'Kvíz':mode==='fill'?'Lyukas szöveg':mode==='sort'?'Sorrendbe állítás':'Kategorizálás';
    area.innerHTML=
      '<div class="card result-screen">'+
        '<span class="result-emoji">'+emoji+'</span>'+
        '<div class="stars">'+starsStr(score,total)+'</div>'+
        '<div class="result-title">'+title+'</div>'+
        '<div class="result-sub">'+sub+'</div>'+
        '<div class="result-grid">'+
          '<div class="stat-box"><div class="stat-num">'+score+' / '+total+'</div><div class="stat-lbl">✅ Helyes</div></div>'+
          '<div class="stat-box"><div class="stat-num">'+pct+'%</div><div class="stat-lbl">📊 Arány</div></div>'+
          '<div class="stat-box time-stat"><div class="stat-num">'+formatTime(elapsedSeconds)+'</div><div class="stat-lbl">⏱ Idő</div></div>'+
          '<div class="stat-box streak-stat"><div class="stat-num">'+bestStreak+'</div><div class="stat-lbl">🔥 Legjobb sorozat</div></div>'+
        '</div>'+
        '<div class="saving-msg" id="savingMsg">⏳ Eredmény mentése...</div>'+
        '<div class="result-btns">'+
          '<button class="rbtn orange" onclick="startGame(\''+mode+'\')">🔄 Újra</button>'+
          '<button class="rbtn green" onclick="showModes('+currentTopic.id+')">📚 Módok</button>'+
          '<button class="rbtn blue" onclick="showBigTopics()">🏠 Főmenü</button>'+
        '</div>'+
      '</div>';
    saveResult(playerName,currentBigTopic.title,currentTopic.title,modeLabel,score,total,elapsedSeconds,bestStreak);
    return;
  }
  const q=questions[current];
  const[dClass,dLabel]=diffLabel(q.diff);
  const prog=Math.round((current/total)*100);
  const onFire=streak>=3;
  const nextLabel=current+1<total?'Következő ➡️':'Eredmény 🏆';
  const topBar=
    '<div class="top-bar">'+
      '<div class="q-counter">'+(current+1)+' / '+total+'</div>'+
      '<div class="prog-wrap"><div class="prog-fill" style="width:'+prog+'%"></div></div>'+
      '<div class="score-pill">🌟 '+score+'</div>'+
      '<div class="streak-pill '+(onFire?'on-fire':'')+'" id="streakPill">'+streakLabel()+'</div>'+
      '<div class="timer-pill" id="timerPill">⏱ '+formatTime(elapsedSeconds)+'</div>'+
    '</div>';
  if(mode==='fill'){renderFill(area,q,topBar,dClass,dLabel,nextLabel);}
  else if(mode==='sort'){renderSort(area,q,topBar,dClass,dLabel,nextLabel);}
  else if(mode==='cat'){renderCat(area,q,topBar,dClass,dLabel,nextLabel);}
  else{
    let ansHTML='';
    if(mode==='tf'){
      ansHTML='<div class="tf-row"><button class="ans-btn btn-true" id="btnTrue" onclick="answerTF(true)">✅ IGAZ</button><button class="ans-btn btn-false" id="btnFalse" onclick="answerTF(false)">❌ HAMIS</button></div>';
    } else {
      ansHTML='<div class="opts-grid">';
      q.opts.forEach(function(o,i){ansHTML+='<button class="opt-btn" id="opt'+i+'" onclick="answerQuiz('+i+')">'+o+'</button>';});
      ansHTML+='</div>';
    }
    area.innerHTML=topBar+'<div class="card"><div class="q-number">📋 '+(current+1)+'. kérdés — '+playerName+'</div><span class="diff-badge '+dClass+'">'+dLabel+'</span><div class="q-text">'+q.text+'</div>'+ansHTML+'<div class="feedback" id="feedback"></div><button class="next-btn" id="nextBtn" onclick="next()">'+nextLabel+'</button></div>';
    answered=false;
  }
}

function renderFill(area,q,topBar,dClass,dLabel,nextLabel){
  let sentenceHTML='<div class="fill-sentence">';
  q.parts.forEach(function(part){
    if(typeof part==='string'){sentenceHTML+=part;}
    else{
      const gap=q.gaps.find(function(g){return g.id===part.id;});
      const shuffled=[...gap.options].sort(function(){return Math.random()-0.5;});
      sentenceHTML+='<select class="fill-select" id="gap'+gap.id+'"><option value="">— válassz —</option>';
      shuffled.forEach(function(opt){sentenceHTML+='<option value="'+opt+'">'+opt+'</option>';});
      sentenceHTML+='</select>';
    }
  });
  sentenceHTML+='</div>';
  area.innerHTML=topBar+'<div class="card"><div class="q-number">✏️ '+(current+1)+'. mondat — '+playerName+'</div><span class="diff-badge '+dClass+'">'+dLabel+'</span><p class="fill-hint">Válaszd ki a legördülő menüből a megfelelő szót!</p>'+sentenceHTML+'<div class="fill-result" id="fillResult"></div><button class="check-fill-btn" id="checkBtn" onclick="checkFill()">✅ Ellenőrzés</button><button class="next-btn" id="nextBtn" onclick="next()">'+nextLabel+'</button></div>';
  answered=false;
}

function checkFill(){
  if(answered)return;
  const q=currentTopic.fill[current];
  let allCorrect=true,anyEmpty=false;
  q.gaps.forEach(function(gap){
    const sel=document.getElementById('gap'+gap.id);
    if(!sel.value)anyEmpty=true;
    else if(sel.value!==gap.correct)allCorrect=false;
  });
  if(anyEmpty){
    const res=document.getElementById('fillResult');
    res.className='fill-result show partial';res.textContent='⚠️ Kérlek töltsd ki az összes üres helyet!';return;
  }
  answered=true;document.getElementById('checkBtn').disabled=true;
  q.gaps.forEach(function(gap){
    const sel=document.getElementById('gap'+gap.id);sel.disabled=true;
    sel.classList.add(sel.value===gap.correct?'correct':'wrong');
  });
  if(allCorrect){score++;streak++;if(streak>bestStreak)bestStreak=streak;}else{streak=0;}
  const pill=document.getElementById('streakPill');
  if(pill){pill.textContent=streakLabel();pill.className='streak-pill';void pill.offsetWidth;if(!allCorrect)pill.classList.add('broken');else{if(streak>=3)pill.classList.add('on-fire');pill.classList.add('pop');}}
  let correctText='A helyes válasz: ';
  q.gaps.forEach(function(gap,i){if(i>0)correctText+=', ';correctText+='"'+gap.correct+'"';});
  const res=document.getElementById('fillResult');
  if(allCorrect){let prefix='✅ Helyes! ';if(streak>=5)prefix='🔥🔥 '+streak+' sorozat! ';else if(streak>=3)prefix='🔥 '+streak+' sorozat! ';res.className='fill-result show correct';res.textContent=prefix+'Minden szót jól választottál!';}
  else{res.className='fill-result show wrong';res.textContent='❌ Nem egészen. '+correctText;}
  document.getElementById('nextBtn').classList.add('show');
}

function handleResult(correct,explain){
  if(correct){score++;streak++;if(streak>bestStreak)bestStreak=streak;}else streak=0;
  const pill=document.getElementById('streakPill');
  if(pill){pill.textContent=streakLabel();pill.className='streak-pill';void pill.offsetWidth;if(!correct)pill.classList.add('broken');else{if(streak>=3)pill.classList.add('on-fire');pill.classList.add('pop');}}
  const fb=document.getElementById('feedback');
  let prefix=correct?'✅ Helyes! ':'❌ Nem egészen. ';
  if(correct&&streak>=5)prefix='🔥🔥 '+streak+' egymás utáni helyes! ';
  else if(correct&&streak>=3)prefix='🔥 '+streak+' sorozat! ';
  fb.className='feedback show '+(correct?'correct':'wrong');fb.textContent=prefix+explain;
  document.getElementById('nextBtn').classList.add('show');
}

function answerTF(choice){
  if(answered)return;answered=true;
  const q=currentTopic.tf[current];const correct=choice===q.answer;
  const bT=document.getElementById('btnTrue'),bF=document.getElementById('btnFalse');
  bT.disabled=true;bF.disabled=true;
  const chosen=choice?bT:bF;
  if(correct)chosen.classList.add('selected-correct');
  else{chosen.classList.add('selected-wrong');(q.answer?bT:bF).classList.add('reveal-correct');}
  handleResult(correct,q.explain);
}

function answerQuiz(i){
  if(answered)return;answered=true;
  const q=currentTopic.quiz[current];const correct=i===q.correct;
  for(let j=0;j<q.opts.length;j++){
    const btn=document.getElementById('opt'+j);btn.disabled=true;
    if(j===i&&correct)btn.classList.add('selected-correct');
    else if(j===i&&!correct)btn.classList.add('selected-wrong');
    else if(j===q.correct)btn.classList.add('reveal-correct');
  }
  handleResult(correct,q.explain);
}

function next(){current++;render();window.scrollTo({top:0,behavior:'smooth'});}

function saveResult(name,bigTopic,subTopic,modeLabel,score,total,time,bestStreak){
  fetch(SHEET_URL,{
    method:'POST',headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({name:name,mode:bigTopic+' › '+subTopic+' — '+modeLabel,score:score+' / '+total,time:formatTime(time),bestStreak:bestStreak})
  })
  .then(function(r){return r.json();})
  .then(function(){const msg=document.getElementById('savingMsg');if(msg){msg.textContent='✅ Eredmény elmentve!';msg.className='saving-msg ok';}})
  .catch(function(){const msg=document.getElementById('savingMsg');if(msg){msg.textContent='⚠️ Mentés nem sikerült.';msg.className='saving-msg err';}});
}


// ═══════════════════════════════
// SORRENDBE ÁLLÍTÁS
// ═══════════════════════════════
let sortDragSrc = null;

function renderSort(area, q, topBar, dClass, dLabel, nextLabel) {
  // Shuffle items for display
  const shuffled = q.items.map(function(text, i){ return {text:text, origIdx:i}; });
  for(let i=shuffled.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];}
  
  let itemsHTML = '';
  shuffled.forEach(function(item, i){
    itemsHTML += '<div class="sort-item" draggable="true" data-idx="'+i+'" data-orig="'+item.origIdx+'" '+
      'ondragstart="sortDragStart(event)" ondragover="sortDragOver(event)" '+
      'ondrop="sortDrop(event)" ondragend="sortDragEnd(event)">'+
      '<span class="sort-handle">☰</span>'+
      '<span class="sort-num">'+(i+1)+'.</span>'+
      '<span>'+item.text+'</span>'+
    '</div>';
  });

  area.innerHTML = topBar +
    '<div class="card">'+
      '<div class="q-number">🔢 '+(current+1)+'. feladat — '+playerName+'</div>'+
      '<span class="diff-badge '+dClass+'">'+dLabel+'</span>'+
      '<div class="q-text">'+q.question+'</div>'+
      '<div class="sort-intro">💡 Húzd a sorokat a helyes sorrendbe!</div>'+
      '<div class="sort-list" id="sortList">'+itemsHTML+'</div>'+
      '<div class="sort-result" id="sortResult"></div>'+
      '<button class="sort-check-btn" id="sortCheckBtn" onclick="checkSort()">✅ Ellenőrzés</button>'+
      '<button class="next-btn" id="nextBtn" onclick="next()">'+nextLabel+'</button>'+
    '</div>';
  answered = false;
  // Update numbers after drag
  updateSortNumbers();
}

function sortDragStart(e){
  sortDragSrc = e.currentTarget;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
}
function sortDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  document.querySelectorAll('.sort-item').forEach(function(el){el.classList.remove('drag-over');});
  if(e.currentTarget!==sortDragSrc) e.currentTarget.classList.add('drag-over');
}
function sortDrop(e){
  e.preventDefault();
  if(sortDragSrc===e.currentTarget)return;
  const list=document.getElementById('sortList');
  const items=[...list.querySelectorAll('.sort-item')];
  const srcIdx=items.indexOf(sortDragSrc);
  const tgtIdx=items.indexOf(e.currentTarget);
  if(srcIdx<tgtIdx) list.insertBefore(sortDragSrc, e.currentTarget.nextSibling);
  else list.insertBefore(sortDragSrc, e.currentTarget);
  updateSortNumbers();
}
function sortDragEnd(e){
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.sort-item').forEach(function(el){el.classList.remove('drag-over');});
}
function updateSortNumbers(){
  document.querySelectorAll('.sort-item').forEach(function(el,i){
    el.querySelector('.sort-num').textContent=(i+1)+'.';
  });
}

function checkSort(){
  if(answered)return;
  const q = currentTopic.sort[current];
  const list = document.getElementById('sortList');
  const items = [...list.querySelectorAll('.sort-item')];
  const userOrder = items.map(function(el){return parseInt(el.getAttribute('data-orig'));});
  
  // Build correct order: correct[i] = origIdx that should be at position i
  const correctOrder = q.correct;
  let allOk = true;
  items.forEach(function(el, i){
    const origIdx = parseInt(el.getAttribute('data-orig'));
    const isCorrect = origIdx === correctOrder[i];
    if(!isCorrect) allOk = false;
    el.classList.add(isCorrect ? 'correct-item' : 'wrong-item');
  });
  
  answered = true;
  document.getElementById('sortCheckBtn').disabled = true;
  
  if(allOk){score++;streak++;if(streak>bestStreak)bestStreak=streak;}else{streak=0;}
  const pill=document.getElementById('streakPill');
  if(pill){pill.textContent=streakLabel();pill.className='streak-pill';void pill.offsetWidth;if(!allOk)pill.classList.add('broken');else{if(streak>=3)pill.classList.add('on-fire');pill.classList.add('pop');}}
  
  const res=document.getElementById('sortResult');
  if(allOk){
    let prefix='✅ Tökéletes sorrend! ';
    if(streak>=5)prefix='🔥🔥 '+streak+' sorozat! ';
    else if(streak>=3)prefix='🔥 '+streak+' sorozat! ';
    res.className='sort-result show correct';
    res.textContent=prefix+q.explain;
  } else {
    res.className='sort-result show wrong';
    res.textContent='❌ Nem egészen. '+q.explain;
  }
  document.getElementById('nextBtn').classList.add('show');
}

// ═══════════════════════════════
// KATEGORIZÁLÁS
// ═══════════════════════════════
let catDragItem = null;

function renderCat(area, q, topBar, dClass, dLabel, nextLabel){
  // Shuffle items
  const shuffled = [...q.items].sort(function(){return Math.random()-0.5;});
  
  let poolHTML = '';
  shuffled.forEach(function(item, i){
    poolHTML += '<div class="cat-item" draggable="true" data-i="'+i+'" data-correct="'+item.correct+'" data-text="'+item.text+'" '+
      'ondragstart="catDragStart(event)" ondragend="catDragEnd(event)" onclick="catItemClick(this)">'+
      item.text+'</div>';
  });

  area.innerHTML = topBar +
    '<div class="card">'+
      '<div class="q-number">🗂️ '+(current+1)+'. feladat — '+playerName+'</div>'+
      '<span class="diff-badge '+dClass+'">'+dLabel+'</span>'+
      '<div class="q-text">'+q.question+'</div>'+
      '<div class="cat-intro">💡 Húzd (vagy kattints) a kártyákat a megfelelő dobozba! Minden kártyát be kell sorolni!</div>'+
      '<div class="cat-items-pool" id="catPool" ondragover="catPoolOver(event)" ondrop="catPoolDrop(event)">'+poolHTML+'</div>'+
      '<div class="cat-boxes">'+
        '<div class="cat-box box-yes" id="catBoxYes" ondragover="catBoxOver(event)" ondrop="catBoxDrop(event,true)">'+
          '<div class="cat-box-title">'+q.boxYes+'</div>'+
          '<div class="cat-box-items" id="catBoxYesItems"></div>'+
        '</div>'+
        '<div class="cat-box box-no" id="catBoxNo" ondragover="catBoxOver(event)" ondrop="catBoxDrop(event,false)">'+
          '<div class="cat-box-title">'+q.boxNo+'</div>'+
          '<div class="cat-box-items" id="catBoxNoItems"></div>'+
        '</div>'+
      '</div>'+
      '<div class="cat-result" id="catResult"></div>'+
      '<button class="cat-check-btn" id="catCheckBtn" onclick="checkCat()">✅ Ellenőrzés</button>'+
      '<button class="next-btn" id="nextBtn" onclick="next()">'+nextLabel+'</button>'+
    '</div>';
  answered = false;
}

function catDragStart(e){
  catDragItem = e.currentTarget;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
}
function catDragEnd(e){e.currentTarget.classList.remove('dragging');}
function catBoxOver(e){e.preventDefault();e.currentTarget.classList.add('drag-active');}
function catPoolOver(e){e.preventDefault();}

function catBoxDrop(e, isYes){
  e.preventDefault();
  document.querySelectorAll('.cat-box').forEach(function(b){b.classList.remove('drag-active');});
  if(!catDragItem)return;
  const target = isYes ? document.getElementById('catBoxYesItems') : document.getElementById('catBoxNoItems');
  target.appendChild(catDragItem);
  catDragItem.setAttribute('data-placed', isYes?'yes':'no');
  catDragItem = null;
}
function catPoolDrop(e){
  e.preventDefault();
  if(!catDragItem)return;
  document.getElementById('catPool').appendChild(catDragItem);
  catDragItem.removeAttribute('data-placed');
  catDragItem = null;
}

// Click to cycle: pool → yes → no → pool
function catItemClick(el){
  if(answered)return;
  const placed = el.getAttribute('data-placed');
  if(!placed){
    document.getElementById('catBoxYesItems').appendChild(el);
    el.setAttribute('data-placed','yes');
  } else if(placed==='yes'){
    document.getElementById('catBoxNoItems').appendChild(el);
    el.setAttribute('data-placed','no');
  } else {
    document.getElementById('catPool').appendChild(el);
    el.removeAttribute('data-placed');
  }
}

function checkCat(){
  if(answered)return;
  const q = currentTopic.cat[current];
  // Check all items are placed
  const pool = document.getElementById('catPool');
  if(pool.querySelectorAll('.cat-item').length > 0){
    const res=document.getElementById('catResult');
    res.className='cat-result show';res.style.background='#fff3c0';res.style.border='2.5px solid #e89c10';res.style.color='#7a5000';
    res.textContent='⚠️ Még nem soroltad be az összes kártyát!';return;
  }
  
  answered = true;
  document.getElementById('catCheckBtn').disabled = true;
  
  let allOk = true;
  document.querySelectorAll('.cat-item').forEach(function(el){
    const placedYes = el.getAttribute('data-placed')==='yes';
    const shouldBeYes = el.getAttribute('data-correct')==='true';
    const isCorrect = placedYes === shouldBeYes;
    if(!isCorrect) allOk = false;
    el.classList.add(isCorrect?'correct-item':'wrong-item');
  });
  
  if(allOk){score++;streak++;if(streak>bestStreak)bestStreak=streak;}else{streak=0;}
  const pill=document.getElementById('streakPill');
  if(pill){pill.textContent=streakLabel();pill.className='streak-pill';void pill.offsetWidth;if(!allOk)pill.classList.add('broken');else{if(streak>=3)pill.classList.add('on-fire');pill.classList.add('pop');}}
  
  const res=document.getElementById('catResult');
  if(allOk){
    let prefix='✅ Tökéletes besorolás! ';
    if(streak>=5)prefix='🔥🔥 '+streak+' sorozat! ';
    else if(streak>=3)prefix='🔥 '+streak+' sorozat! ';
    res.className='cat-result show correct';res.textContent=prefix+q.explain;
  } else {
    res.className='cat-result show wrong';res.textContent='❌ Nem teljesen. '+q.explain;
  }
  document.getElementById('nextBtn').classList.add('show');
}
